title = "LevelUp App — Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
description = "Known-safe public Firebase client-side config values"

# firebase-config.example.js is a committed template with placeholder values only.
paths = [
  "firebase-config.example.js",
]

# These are public Firebase client-side identifiers (not secrets).
# They appear in firebase-config.example.js, documentation, and scripts.
regexes = [
  "YOUR_API_KEY",
  "YOUR_PROJECT",
  "PLACEHOLDER",
  "levelup-app-53d02",
  "233040099152",
  "1:233040099152:web:82310514d26c8c6d52de55",
  "G-4DBGG03CCJ",
]

[[rules]]
id = "google-api-key-override"
description = "Detect hardcoded Google/Firebase API keys (AIzaSy... format)"
regex = '''AIza[0-9A-Za-z_-]{35}'''
tags = ["google", "firebase", "api-key"]

  [rules.allowlist]
  paths = [
    ".*example.*",
    ".*template.*",
  ]
  regexes = [
    "^\\s*#",
    "^\\s*//",
  ]
