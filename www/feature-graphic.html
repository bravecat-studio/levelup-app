<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #050508;
    color: #ffffff;
}

.canvas {
    position: relative;
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: linear-gradient(135deg, #050508 0%, #0a0a1a 30%, #0f0a20 50%, #0a0a14 70%, #050508 100%);
}

/* Background glow effects */
.glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
}

.glow-1 {
    width: 500px;
    height: 500px;
    background: #00d9ff;
    top: -200px;
    right: 50px;
    opacity: 0.12;
}

.glow-2 {
    width: 450px;
    height: 450px;
    background: #b53cff;
    bottom: -200px;
    left: 100px;
    opacity: 0.10;
}

.glow-3 {
    width: 300px;
    height: 300px;
    background: #00d9ff;
    bottom: -100px;
    right: 200px;
    opacity: 0.06;
}

/* Grid pattern overlay */
.grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,217,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,217,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
}

/* Content layout */
.content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    height: 100%;
    padding: 0 70px;
    gap: 50px;
}

/* Left section */
.left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.studio-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #ffcc00;
    opacity: 0.7;
    margin-bottom: 16px;
}

.app-title {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
}

.main-title {
    font-size: 42px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 6px;
    letter-spacing: -1px;
}

.main-title .highlight {
    background: linear-gradient(135deg, #00d9ff, #b53cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.sub-title {
    font-size: 38px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 20px;
    letter-spacing: -1px;
}

.desc {
    font-size: 15px;
    color: #aaaacc;
    line-height: 1.6;
    margin-bottom: 28px;
    max-width: 420px;
}

/* Stat chips */
.stat-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    font-size: 12px;
    font-weight: 600;
    color: #aaaacc;
}

.stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

.stat-dot.str { background: #ff3c3c; }
.stat-dot.int { background: #00d9ff; }
.stat-dot.cha { background: #b53cff; }
.stat-dot.vit { background: #00ff88; }
.stat-dot.wlt { background: #ffcc00; }
.stat-dot.agi { background: #ff8800; }

/* Right section - Radar chart + decorative elements */
.right {
    flex: 0 0 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Hexagonal radar chart */
.radar-container {
    position: relative;
    width: 300px;
    height: 300px;
}

.radar-glow {
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, rgba(0,217,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
}

.radar-svg {
    position: relative;
    z-index: 1;
}

/* Floating feature icons */
.float-icon {
    position: absolute;
    width: 44px;
    height: 44px;
    background: rgba(15,25,40,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 3;
}

.float-icon-1 { top: 10px; right: -10px; }
.float-icon-2 { bottom: 30px; right: -20px; }
.float-icon-3 { top: 40px; left: -15px; }
.float-icon-4 { bottom: 10px; left: -10px; }

/* Sword icon decorative */
.sword-icon {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    z-index: 3;
}

/* Bottom bar */
.bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff3c3c, #ff8800, #ffcc00, #00ff88, #00d9ff, #b53cff);
    z-index: 10;
}

/* Corner accents */
.corner-accent {
    position: absolute;
    width: 80px;
    height: 80px;
    z-index: 1;
}

.corner-tl {
    top: 0;
    left: 0;
    border-top: 2px solid rgba(0,217,255,0.15);
    border-left: 2px solid rgba(0,217,255,0.15);
}

.corner-br {
    bottom: 0;
    right: 0;
    border-bottom: 2px solid rgba(181,60,255,0.15);
    border-right: 2px solid rgba(181,60,255,0.15);
}
</style>
</head>
<body>
<div class="canvas">
    <!-- Background effects -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="grid-overlay"></div>
    <div class="corner-accent corner-tl"></div>
    <div class="corner-accent corner-br"></div>

    <!-- Content -->
    <div class="content">
        <!-- Left: Text -->
        <div class="left">
            <div class="studio-badge">BRAVECAT STUDIOS</div>
            <div class="app-title">LEVEL UP : REBOOT</div>
            <div class="main-title">
                현실을 <span class="highlight">게임</span>처럼,
            </div>
            <div class="sub-title">
                <span class="highlight">당신의 삶</span>을 레벨업
            </div>
            <div class="desc">
                RPG 성장 시스템으로 현실을 레벨업하세요.<br>
                퀘스트 · 스탯 · 던전 · 랭킹
            </div>
            <div class="stat-chips">
                <div class="stat-chip"><span class="stat-dot str"></span>STR</div>
                <div class="stat-chip"><span class="stat-dot int"></span>INT</div>
                <div class="stat-chip"><span class="stat-dot cha"></span>CHA</div>
                <div class="stat-chip"><span class="stat-dot vit"></span>VIT</div>
                <div class="stat-chip"><span class="stat-dot wlt"></span>WLT</div>
                <div class="stat-chip"><span class="stat-dot agi"></span>AGI</div>
            </div>
        </div>

        <!-- Right: Radar chart -->
        <div class="right">
            <div class="radar-container">
                <div class="radar-glow"></div>
                <div class="sword-icon">⚔️</div>
                <svg class="radar-svg" width="300" height="300" viewBox="0 0 300 300">
                    <!-- Hexagonal grid lines -->
                    <g transform="translate(150,150)">
                        <!-- Outer hexagon (grid) -->
                        <polygon points="0,-120 103.9,-60 103.9,60 0,120 -103.9,60 -103.9,-60"
                            fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                        <polygon points="0,-90 77.9,-45 77.9,45 0,90 -77.9,45 -77.9,-45"
                            fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
                        <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
                            fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
                        <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
                            fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

                        <!-- Axis lines -->
                        <line x1="0" y1="0" x2="0" y2="-120" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                        <line x1="0" y1="0" x2="103.9" y2="-60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                        <line x1="0" y1="0" x2="103.9" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                        <line x1="0" y1="0" x2="0" y2="120" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                        <line x1="0" y1="0" x2="-103.9" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                        <line x1="0" y1="0" x2="-103.9" y2="-60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

                        <!-- Data polygon (filled) -->
                        <polygon points="0,-90 83.1,-36 72.8,48 0,84 -62.3,39 -77.9,-45"
                            fill="url(#radarFill)"
                            stroke="url(#radarGrad)" stroke-width="2.5"/>

                        <!-- Data points with glow -->
                        <circle cx="0" cy="-90" r="5" fill="#ff3c3c" filter="url(#glow)"/>
                        <circle cx="83.1" cy="-36" r="5" fill="#00d9ff" filter="url(#glow)"/>
                        <circle cx="72.8" cy="48" r="5" fill="#b53cff" filter="url(#glow)"/>
                        <circle cx="0" cy="84" r="5" fill="#00ff88" filter="url(#glow)"/>
                        <circle cx="-62.3" cy="39" r="5" fill="#ffcc00" filter="url(#glow)"/>
                        <circle cx="-77.9" cy="-45" r="5" fill="#ff8800" filter="url(#glow)"/>

                        <!-- Stat labels -->
                        <text x="0" y="-128" text-anchor="middle" fill="#ff3c3c" font-size="12" font-weight="800" font-family="Inter,sans-serif">STR</text>
                        <text x="118" y="-56" text-anchor="start" fill="#00d9ff" font-size="12" font-weight="800" font-family="Inter,sans-serif">INT</text>
                        <text x="118" y="68" text-anchor="start" fill="#b53cff" font-size="12" font-weight="800" font-family="Inter,sans-serif">CHA</text>
                        <text x="0" y="142" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="800" font-family="Inter,sans-serif">VIT</text>
                        <text x="-118" y="68" text-anchor="end" fill="#ffcc00" font-size="12" font-weight="800" font-family="Inter,sans-serif">WLT</text>
                        <text x="-118" y="-56" text-anchor="end" fill="#ff8800" font-size="12" font-weight="800" font-family="Inter,sans-serif">AGI</text>
                    </g>

                    <defs>
                        <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00d9ff"/>
                            <stop offset="50%" stop-color="#b53cff"/>
                            <stop offset="100%" stop-color="#00d9ff"/>
                        </linearGradient>
                        <linearGradient id="radarFill" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="rgba(0,217,255,0.25)"/>
                            <stop offset="100%" stop-color="rgba(181,60,255,0.15)"/>
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="blur"/>
                            <feMerge>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                </svg>

                <!-- Floating icons -->
                <div class="float-icon float-icon-1">📋</div>
                <div class="float-icon float-icon-2">🏰</div>
                <div class="float-icon float-icon-3">📊</div>
                <div class="float-icon float-icon-4">👥</div>
            </div>
        </div>
    </div>

    <!-- Bottom rainbow bar -->
    <div class="bottom-bar"></div>
</div>
</body>
</html>
